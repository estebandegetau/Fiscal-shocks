format:
  html:
    lightbox: true
    toc: true
    toc-depth: 3
    code-fold: true
    code-summary: "Show code"
    self-contained: true
    execute:
      echo: true
  typst:
    papersize: a4
    margin:
        x: 0cm
        y: 0cm
    columns: 1
    execute:
      echo: false

execute:
  warning: false
  message: false
  freeze: true

date: today
date-format: long
# reference-location: margin
fig-cap-location: top
tbl-cap-location: top