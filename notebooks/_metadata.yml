format:
  html:
    lightbox: true
    toc: true
    toc-depth: 3
    code-fold: true
    code-summary: "Show code"
    self-contained: true
    execute:
      echo: true
  typst:
    grid:
      margin-width: 2in
      body-width: 4in
      gutter-width: 0.25in
    execute:
      echo: false

execute:
  warning: false
  message: false
  freeze: true

date: today
date-format: long