codebook:
  name: "C2a: Motivation Evidence Extraction"
  version: "0.4.0"
  instructions: >
    You are an expert in fiscal policy analysis extracting motivation evidence from
    chunks of official government economic and budget documents. Each chunk has already
    been identified as containing a substantive discussion of a specific fiscal measure.
    Your task is to extract two types of evidence from the chunk:


    1. **Motivation evidence**: All evidence about **why** the fiscal measure was enacted,
    proposed, or under consideration — the stated goals, economic conditions cited as
    justification, and any other indications of the policymakers' motivation.


    2. **Enacted-status signals**: Any evidence about the **legislative status** of the
    measure — whether it was enacted into law, took legal effect (including via executive
    or administrative action), was defeated, withdrawn, or remained a proposal. These signals
    will be used downstream to determine whether the measure became law.


    You will be given: the chunk text, the name of the fiscal measure, and the year of
    passage. For each distinct piece of motivation evidence you find, extract a direct
    quote and describe the signal it represents. See the examples below for what kinds
    of motivation signals to look for.


    Extract only evidence that is explicitly present in the text. Do not infer motivation
    from economic conditions unless policymakers are quoted or paraphrased as citing those
    conditions as their reason for acting. Multiple pieces of evidence may point to
    different types of motivation — extract them all separately.

  examples:
    - input:
        act_name: "National Defense Revenue Act"
        year: 1951
        text: >
          After the outbreak of hostilities in Korea, the Congress recognized the need
          for substantially increased revenues to meet the rising costs of national defense.
          The President stated that 'we must pay for the increased defense effort through
          higher taxes rather than through borrowing.' The act was signed into law on
          October 20, 1951, raising individual and corporate income tax rates.
      output:
        evidence:
          - quote: "the Congress recognized the need for substantially increased revenues to meet the rising costs of national defense"
            signal: "Revenue measure motivated by financing increased defense spending"
          - quote: "we must pay for the increased defense effort through higher taxes rather than through borrowing"
            signal: "Stated goal of financing defense spending through taxation"
        enacted_signals:
          - quote: "The act was signed into law on October 20, 1951"
            signal: "Signed into law"

    - input:
        act_name: "Economic Recovery Tax Act"
        year: 1981
        text: >
          The Administration argued that high marginal tax rates were reducing incentives
          for work, saving, and investment. The President stated that 'our tax system has
          become an obstacle to growth, penalizing productive effort and discouraging
          innovation.' By reducing marginal rates and indexing tax brackets for inflation,
          the act aimed to raise long-run economic growth and improve economic efficiency.
          The measure was enacted on August 13, 1981.
      output:
        evidence:
          - quote: "high marginal tax rates were reducing incentives for work, saving, and investment"
            signal: "Stated concern about structural disincentives from the tax system"
          - quote: "our tax system has become an obstacle to growth, penalizing productive effort and discouraging innovation"
            signal: "Stated goal of removing structural barriers to long-run growth"
          - quote: "the act aimed to raise long-run economic growth and improve economic efficiency"
            signal: "Stated goal of raising long-run growth and improving efficiency"
        enacted_signals:
          - quote: "The measure was enacted on August 13, 1981"
            signal: "Enacted into law"

    - input:
        act_name: "Emergency Stimulus Act"
        year: 2009
        text: >
          With unemployment rising sharply and GDP contracting for the second consecutive
          quarter, the government enacted temporary tax relief. The Secretary of the Treasury
          testified that 'these measures are needed to counteract the recession and restore
          the economy to its normal growth path.' The relief provisions were designed to
          expire once economic conditions normalized.
      output:
        evidence:
          - quote: "unemployment rising sharply and GDP contracting for the second consecutive quarter"
            signal: "Economic conditions cited as justification for the measure"
          - quote: "these measures are needed to counteract the recession and restore the economy to its normal growth path"
            signal: "Stated goal of counteracting recession and restoring normal growth"
          - quote: "The relief provisions were designed to expire once economic conditions normalized"
            signal: "Temporary measure tied to cyclical economic conditions"
        enacted_signals: []

    - input:
        act_name: "Fiscal Responsibility Act"
        year: 1993
        text: >
          The deficit, accumulated over many years of past policy decisions, threatened
          long-term fiscal stability. The primary purpose of the act was to restore fiscal
          balance and reduce the structural budget deficit. The President signed the act
          into law on August 10, 1993.
      output:
        evidence:
          - quote: "The deficit, accumulated over many years of past policy decisions, threatened long-term fiscal stability"
            signal: "Deficit described as inherited from past decisions"
          - quote: "The primary purpose of the act was to restore fiscal balance and reduce the structural budget deficit"
            signal: "Stated goal of deficit reduction and fiscal prudence"
        enacted_signals:
          - quote: "The President signed the act into law on August 10, 1993"
            signal: "Signed into law"

  output_instructions: >
    Extract all motivation evidence and enacted-status signals from the chunk.


    For each distinct piece of motivation evidence, provide a direct quote and a brief
    signal description.


    For each enacted-status signal, provide a direct quote and a brief description of what
    it indicates about the measure's legislative status.


    If the chunk contains no motivation evidence, return an empty array for evidence.
    If the chunk contains no enacted-status signals, return an empty array for
    enacted_signals.


    Return your answer as JSON:

    {
      "evidence": [
        {
          "quote": "Direct quote from the text",
          "signal": "Brief description of the evidence type (e.g., 'stated goal of deficit reduction', 'response to rising unemployment')"
        }
      ],
      "enacted_signals": [
        {
          "quote": "Direct quote about legislative status",
          "signal": "Brief description (e.g., 'signed into law', 'defeated in committee', 'proposed but not passed')"
        }
      ]
    }
