codebook:
  name: "C2b: Motivation Classification"
  version: "0.3.0"
  instructions: >
    You are an expert in fiscal policy analysis classifying the primary motivation for
    a fiscal measure. You will receive the act name, year of passage, and an array of
    evidence records extracted from multiple document chunks. Each evidence record contains
    a direct quote and a signal description.


    Your task is to weigh all evidence, resolve any conflicts, and classify the act's
    motivation. You will also receive enacted-status signals to determine whether the
    measure became law. You must evaluate the evidence using the category definitions and
    decision rules below.


    **Decision rules for resolving conflicting evidence:**

    1. Use the motivation most frequently and consistently cited across all evidence records.

    2. If the stated motivation changed during deliberations, use the prevailing motivation
    at the time of passage, not earlier proposals.

    3. When evidence genuinely supports multiple categories with distinct measure components
    (e.g., one provision is countercyclical while another is structural), return separate
    motivation entries for each component. Identify each component, assign its motivation
    category, and indicate which is dominant by share of the measure's overall fiscal impact.
    Most acts have a single motivation — use multiple entries only when distinct provisions
    genuinely serve different purposes.


    **Boundary case rules (apply these precisely):**

    1. Countercyclical vs. Long-run — the "return to normal" test: If the stated goal is to
    return output growth to its normal level (e.g., responding to rising unemployment or
    falling output), classify as COUNTERCYCLICAL. If the stated goal is to raise growth
    above its normal level (e.g., structural reform, improved incentives, potential output),
    classify as LONG_RUN. Take policymakers' statements at face value regarding what they
    consider normal growth. If the measure was proposed when the economy was growing normally
    but motivated by a desire for faster growth, classify as LONG_RUN even if the economy
    weakened by the time of passage.

    2. Spending-driven vs. Deficit-driven — the 1-year temporal rule: If a fiscal measure
    pays for a spending increase that occurred within the past year, classify as
    SPENDING_DRIVEN. If a fiscal measure addresses a deficit that resulted from spending
    decisions made more than one year prior, classify as DEFICIT_DRIVEN. The key question
    is whether the spending change is contemporaneous (within 1 year) or inherited (beyond
    1 year). If the temporal relationship between the spending change and the fiscal measure
    cannot be determined from the evidence, note this uncertainty in your reasoning.

    3. Offsetting exogenous changes: When a fiscal measure offsets a previous exogenous
    change because economic conditions have weakened, classify the offsetting measure with
    the same motivation as the original change, not as COUNTERCYCLICAL. This avoids
    identifying two changes of different motivations when liabilities did not actually change.


    **Enacted-status determination:** Based on the enacted-status signals extracted from the
    evidence records, determine whether the fiscal measure was enacted into law. If evidence
    indicates the measure was signed, became law, or took legal effect (including executive
    orders, administrative actions, or ministerial decrees), set enacted to true. If evidence
    indicates the measure was defeated, withdrawn, vetoed, or remained a proposal,
    set enacted to false. If enacted-status evidence is absent or ambiguous, set enacted to
    true and note the uncertainty in reasoning — the default assumption is that measures
    discussed substantively in official government documents were enacted.

  classes:
    - label: "SPENDING_DRIVEN"
      label_definition: >
        A fiscal measure whose primary stated purpose is to finance, offset, or accompany
        a specific contemporaneous change in government spending.

      clarification:
        - "The evidence consistently describes the measure as financing or paying for a specific spending program or commitment that is being enacted or expanded at the same time"
        - "The spending change and the fiscal measure are described as a package — the fiscal measure exists because of the spending decision"
        - "The temporal link between the spending change and the fiscal measure is within one year"

      negative_clarification:
        - "Do not classify as SPENDING_DRIVEN if the fiscal measure addresses a deficit caused by spending decisions made more than one year prior — classify as DEFICIT_DRIVEN instead"
        - "Do not classify as SPENDING_DRIVEN merely because spending is mentioned in the evidence; the spending change must be the stated reason for the fiscal measure"
        - "Do not classify as SPENDING_DRIVEN when deficit reduction is the primary stated goal, even if the deficit was originally caused by a spending increase — apply the 1-year temporal rule"

    - label: "COUNTERCYCLICAL"
      label_definition: >
        A fiscal measure whose primary stated purpose is to return output growth to its
        normal level in response to a current or projected economic downturn.

      clarification:
        - "The evidence consistently describes the goal as restoring economic growth to its prior trend or normal level, not raising it above normal"
        - "Policymakers cite current or projected economic weakness — rising unemployment, falling output, recession — as the reason for acting"
        - "The measure is explicitly framed as temporary or responsive to cyclical conditions"

      negative_clarification:
        - "Do not classify as COUNTERCYCLICAL merely because the economy is weak at the time of passage; if the stated aim is structural reform, improved efficiency, or raising long-run potential, classify as LONG_RUN"
        - "Do not classify as COUNTERCYCLICAL when the evidence uses words like 'stimulate' or 'growth' but the full context shows the goal is to raise growth above its normal level — apply the 'return to normal' test"
        - "If the measure was proposed during normal economic conditions but motivated by faster growth, classify as LONG_RUN even if the economy weakened by passage"

    - label: "DEFICIT_DRIVEN"
      label_definition: >
        A fiscal measure whose primary stated purpose is to reduce a budget deficit
        inherited from previous policy decisions rather than caused by a contemporaneous
        spending change.

      clarification:
        - "The evidence consistently describes the deficit as inherited, pre-existing, or resulting from past decisions rather than from a recent spending increase"
        - "Policymakers cite fiscal prudence, actuarial soundness, social insurance fund or pension reserve solvency, or restoring fiscal balance as the reason for acting"
        - "The deficit being addressed predates the fiscal measure by more than one year, or is described as a structural rather than cyclical problem"

      negative_clarification:
        - "Do not classify as DEFICIT_DRIVEN merely because the word 'deficit' appears in the evidence; the deficit must be described as inherited or structural, not as a consequence of a spending increase within the past year"
        - "If the deficit results from a spending increase that occurred within the past year, classify as SPENDING_DRIVEN — the 1-year temporal rule takes precedence"
        - "Do not classify as DEFICIT_DRIVEN when the primary stated goal is structural economic reform or growth improvement — that is LONG_RUN, even if deficit reduction is a secondary benefit"

    - label: "LONG_RUN"
      label_definition: >
        A fiscal measure whose primary stated purpose is to raise long-run economic growth,
        improve economic efficiency, or achieve structural goals unrelated to the current
        business cycle, distinct from restoring growth to a prior normal level.

      clarification:
        - "The evidence consistently describes structural goals: fairness, efficiency, simplification, smaller government, improved incentives, raising potential output, or promoting long-run growth"
        - "The stated aim is to raise growth above its current normal level, not to restore growth to a prior normal level"
        - "The measure is framed as a permanent structural change rather than a temporary cyclical response"

      negative_clarification:
        - "Do not classify as LONG_RUN merely because the passage mentions growth; if the goal is to restore growth to its prior normal level during a downturn, classify as COUNTERCYCLICAL"
        - "Do not classify as LONG_RUN when the primary stated purpose is deficit reduction or fiscal prudence — that is DEFICIT_DRIVEN"
        - "The key distinction from COUNTERCYCLICAL is direction: LONG_RUN raises growth above normal; COUNTERCYCLICAL returns growth to normal from below"

  output_instructions: >
    Determine the act's motivation and enacted status based on the synthesized evidence.


    For most acts, there is a single dominant motivation. When distinct provisions of
    the act genuinely serve different purposes, return a separate entry for each component.


    Valid motivation categories: SPENDING_DRIVEN, COUNTERCYCLICAL, DEFICIT_DRIVEN, LONG_RUN.


    Return your answer as JSON:

    {
      "enacted": true,
      "motivations": [
        {
          "category": "LONG_RUN",
          "component": "Description of the provision or component",
          "share": "dominant"
        }
      ],
      "exogenous": true,
      "confidence": "HIGH",
      "reasoning": "Synthesis of evidence citing specific records and decision rules applied"
    }


    Field definitions:

    - enacted: true if the measure became law; false if defeated, withdrawn, or never
      passed. Default to true if enacted-status evidence is absent.

    - motivations: Array of one or more entries. Each has category (one of the four
      labels), component (brief description of the provision), and share ("dominant",
      "minor", or "sole" if only one entry).

    - exogenous: true if the dominant motivation is DEFICIT_DRIVEN or LONG_RUN; false
      if SPENDING_DRIVEN or COUNTERCYCLICAL.

    - confidence: HIGH if evidence is consistent and clearly points to one category,
      MEDIUM if somewhat ambiguous but one category dominates, LOW if conflicting or sparse.

    - reasoning: Must cite specific evidence records and name the decision rules applied.
