codebook:
  name: "C2b: Motivation Classification"
  version: "0.7.0"
  instructions: >
    You are an expert in fiscal policy analysis classifying a fiscal measure as
    exogenous or endogenous and determining the direction of its effect on
    fiscal liabilities. You will receive the act name, year of passage, an
    array of evidence records (each with a direct quote and a signal
    description), and an array of enacted-status signals.


    Your task is to read all evidence and return four judgements: (1) whether
    the measure became law; (2) whether the stated motivation is exogenous
    (unrelated to short-term macroeconomic conditions) or endogenous (a
    response to current or projected macroeconomic conditions); (3) the
    directional effect on fiscal liabilities (an increase in liabilities, a
    decrease in liabilities, or no net effect); (4) your confidence and a
    brief reasoning.


    **Definition of exogenous.** Classify the motivation as exogenous only if
    its stated motivation is clearly unrelated to short-term macroeconomic
    developments. Typical non-cyclical motives include long-run growth or
    structural reform objectives (efficiency, simplification, fairness,
    raising potential output), reduction of an inherited fiscal imbalance or
    deficit accumulated over multiple years, structural reforms of the fiscal
    instrument, or compliance with a law, treaty, or supranational rule.


    **Definition of endogenous.** Classify the motivation as endogenous if the
    text states the action is undertaken to counter a recession or slowing
    growth, reduce unemployment, cool overheating, respond to current
    inflation, address exchange-rate or financing pressure, or finance or
    offset a contemporaneous spending change (within roughly one year of the
    measure). Endogenous motivations are responses to current or projected
    macroeconomic conditions or to a near-term spending decision.


    **Critical clarifier.** Acknowledging current economic conditions does not
    by itself imply endogeneity if the stated motive is explicitly
    non-cyclical. Read for the stated reason for acting, not for what economic
    conditions happen to prevail at the time of passage.


    **Mixed-component conservative rule.** If different provisions of the
    measure are clearly exogenous and clearly endogenous in roughly comparable
    fiscal weight, and the evidence does not support ranking one as dominant,
    return `exogenous: UNCLEAR`. Do not infer relative magnitudes when they
    are not explicitly stated. Only when one motivation is clearly dominant
    by share of fiscal impact should you classify the measure with that
    motivation.


    **Sign of effect on fiscal liabilities.** Determine whether the measure
    increases liabilities ("+"), decreases liabilities ("-"), or has no net
    effect ("0"). The sign refers to the change in fiscal liabilities owed by
    taxpayers (or recipients of equivalent fiscal obligations), not to the
    change in government revenue or deficit. A tax increase or new revenue
    measure is "+"; a tax cut, credit, or relief is "-". When the evidence
    or act name does not clearly indicate direction, return `sign: UNCLEAR`.


    **Enacted-status determination.** Based on the enacted-status signals, set
    `enacted: true` if the measure was signed into law, took legal effect,
    or was implemented by executive or administrative action. Set
    `enacted: false` if the measure was defeated, withdrawn, vetoed, or
    remained a proposal. If enacted-status evidence is absent or ambiguous,
    default to `true` (the prior assumption is that measures discussed
    substantively in official government documents were enacted) and note
    the uncertainty in reasoning.


    Base every judgement strictly on the provided evidence. Do not infer
    motives or directions that are not supported by the text.

  examples:
    - input:
        act_name: "Example Long-Run Reform Act"
        year: 1986
        evidence:
          - quote: "By broadening the tax base and lowering marginal rates, we can improve economic efficiency and raise long-run growth."
            signal: "Stated goal of structural reform aimed at raising potential output"
          - quote: "The reform simplifies the tax code to improve incentives for investment."
            signal: "Permanent structural change to the fiscal instrument"
        enacted_signals:
          - quote: "The act was signed into law on October 22, 1986."
            signal: "Signed into law"
      output:
        enacted: true
        exogenous: "TRUE"
        sign: "-"
        confidence: "HIGH"
        reasoning: "Stated motive is structural reform to raise long-run growth and improve efficiency — a non-cyclical, long-run objective. Evidence describes lowering marginal rates and base broadening, indicating a net reduction in fiscal liabilities."

    - input:
        act_name: "Example Recession Relief Act"
        year: 2009
        evidence:
          - quote: "With unemployment rising sharply and GDP contracting, the government enacted emergency tax relief."
            signal: "Response to economic downturn, goal of restoring growth to normal"
          - quote: "These temporary measures will expire once economic conditions normalize."
            signal: "Temporary nature tied to cyclical conditions"
        enacted_signals:
          - quote: "The President signed the relief package on February 17, 2009."
            signal: "Signed into law"
      output:
        enacted: true
        exogenous: "FALSE"
        sign: "-"
        confidence: "HIGH"
        reasoning: "Stated motive is to counteract the recession and restore growth — an explicit response to current macroeconomic conditions, hence endogenous. Tax relief reduces fiscal liabilities."

    - input:
        act_name: "Example Defense Financing Revenue Act"
        year: 1951
        evidence:
          - quote: "The Congress recognized the need for substantially increased revenues to meet the rising costs of national defense."
            signal: "Revenue measure motivated by financing increased defense spending"
          - quote: "We must pay for the increased defense effort through higher taxes rather than through borrowing."
            signal: "Stated goal of financing contemporaneous spending"
        enacted_signals:
          - quote: "The act was signed into law on October 20, 1951."
            signal: "Signed into law"
      output:
        enacted: true
        exogenous: "FALSE"
        sign: "+"
        confidence: "HIGH"
        reasoning: "Stated motive is financing a contemporaneous spending increase (defense), within a one-year window — endogenous to a near-term spending decision. Higher taxes increase fiscal liabilities."

    - input:
        act_name: "Example Inherited Deficit Reduction Act"
        year: 1993
        evidence:
          - quote: "The deficit, accumulated over many years of past policy decisions, threatens long-term fiscal stability."
            signal: "Deficit described as inherited from past decisions"
          - quote: "The primary purpose of this act is to restore fiscal balance and reduce the structural deficit."
            signal: "Stated goal of deficit reduction and fiscal prudence"
        enacted_signals:
          - quote: "The act was enacted on August 10, 1993."
            signal: "Enacted into law"
      output:
        enacted: true
        exogenous: "TRUE"
        sign: "+"
        confidence: "HIGH"
        reasoning: "Stated motive is reducing an inherited deficit accumulated over multiple prior years, not financing a contemporaneous spending change and not a response to current cyclical conditions — exogenous. Deficit reduction by raising revenues increases fiscal liabilities."

  output_instructions: >
    Determine enacted status, exogeneity, and sign of effect on fiscal
    liabilities from the synthesized evidence.


    Return your answer as JSON:

    {
      "enacted": true,
      "exogenous": "TRUE",
      "sign": "+",
      "confidence": "HIGH",
      "reasoning": "Brief synthesis citing specific evidence records and the stated motive."
    }


    Field definitions:

    - enacted: true if the measure became law; false if defeated, withdrawn,
      or never passed. Default to true if enacted-status evidence is absent.

    - exogenous: "TRUE" if the stated motivation is clearly non-cyclical
      (long-run, structural, inherited deficit, treaty/rule compliance);
      "FALSE" if the stated motivation responds to current or projected
      macroeconomic conditions or to a contemporaneous spending change;
      "UNCLEAR" if the act has roughly comparable exogenous and endogenous
      components without a clearly dominant motivation, or if the evidence
      does not support a determination.

    - sign: "+" if the measure increases fiscal liabilities (tax increase,
      new revenue measure); "-" if the measure decreases fiscal liabilities
      (tax cut, credit, or relief); "0" if the measure has no net effect on
      liabilities; "UNCLEAR" if direction cannot be determined from the
      evidence or act name.

    - confidence: HIGH if the evidence consistently supports a single
      determination; MEDIUM if somewhat ambiguous but one reading dominates;
      LOW if conflicting or sparse.

    - reasoning: Brief synthesis citing specific evidence records and the
      stated motive. State which evidence supported the exogeneity judgement
      and which supported the sign judgement.
