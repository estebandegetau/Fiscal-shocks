      codebook_gaps_identified:
        - gap: "return_to_normal_too_literal"
          severity: "high"
          affected_acts: 7
          description: >
            The return-to-normal test does not distinguish: (a) closing an
            output gap via structural reform (LONG_RUN) vs demand management
            (COUNTERCYCLICAL); (b) restoring a structural policy to baseline
            (LONG_RUN) vs cyclical stimulus; (c) deliberately overshooting
            normal growth to reduce unemployment (LONG_RUN in RR). RR reads
            through rhetorical framing to underlying policy intent; the
            codebook takes policymaker language at face value.
