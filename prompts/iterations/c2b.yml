        - "No v0.5.0 baseline shuffle: this run cannot attribute the F-cluster instability to v0.6.1 specifically vs. pre-existing C2b structural fragility. The A-cluster's own ~25% instability rate (6/24 acts at stability <= 0.667) suggests a baseline ordering-fragility issue underneath, independent of v0.6.1's rule additions."
