      motivation evidence C1 didn't flag. No correct predictions regressed
      to wrong — the only regression is OBRA 1987 (correct→NA), outweighed
      by 6 NA→correct recoveries plus 1 wrong→correct. However, all metrics
      still come from Gemini Flash with 30.7% C2a failure rate, so these
