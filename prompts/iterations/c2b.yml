      Test VII results are INVALID due to an implementation bug: the swapped-labels
      test rotates class definitions (label_definition, clarification,
      negative_clarification) but does NOT swap the global instructions block, which
      contains boundary-case rules that reference label names directly (e.g.,
      "classify as COUNTERCYCLICAL", "classify as LONG_RUN"). The model receives
      conflicting signals — swapped definitions say one thing, unswapped
      instructions say another — and follows the instructions. This produces 0%
      definition-following as an artifact, not a genuine model signal. All prior
      Test VII results (Haiku v0.3.0 iter 17: 20.5%, Haiku v0.4.0 iter 21: 0%,
