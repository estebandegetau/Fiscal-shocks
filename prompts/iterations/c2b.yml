      category F, the current codebook may be closer to targets than raw
      metrics suggest. If category E, two paths: (1) desemantify label names
      (M1-M4) to force definition-following, or (2) upgrade to a larger
      model (Sonnet) that can execute multi-step boundary reasoning.

