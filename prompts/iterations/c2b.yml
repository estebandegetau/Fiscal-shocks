      Run the same diagnostic against the v0.5.0 codebook to establish
      whether the F-cluster instability originated with v0.6.0/v0.6.1's
      rule additions or pre-dates them. If v0.5.0 shows comparable
      F-cluster fragility, the issue is structural (C2b is generally
      order-fragile) and v0.6.1 is not the source of the overfit signal
      — strengthens iter 35's case to freeze v0.6.1 and reframe the
      paper around the structural ceiling. If v0.5.0 shows higher
      F-cluster stability, v0.6.1's rule additions are the proximal
      cause of the overfit and the candidate next steps tilt toward
      revert-or-redesign rather than freeze. Implementation: parameterize
      c2b_evidence_shuffle_diagnostic to accept a codebook path argument,
      add a v0.5.0 variant target reading the codebook at git hash
      2ca1af2 (last v0.5.0 commit), then compare the two runs side by
      side. Cost: ~132 additional Haiku calls (~$5-10).
