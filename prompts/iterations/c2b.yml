            v0.4.0 strengthened decision rule 1 (provision structure
            outweighs cyclical rhetoric) and decision rule 4 (explicit
            spending causal link takes precedence) without specifying
            which rule wins when both apply. Boundary case rule 4
            (inflation-fighting → COUNTER) is scoped too narrowly
            (inflation-vs-deficit only). When an act has both
            provision-structure signals and spending-link signals, the
            model picks whichever rule dominates in the specific
            wording — leading to inconsistent classifications across
            similar acts. Priority fix.
        pattern_2_multi_motivation_convention:
