      classifies each iter-30 F+A act with the original C2a evidence
      ordering plus k=3 deterministic permutations (seed 42L+i per act).
      Per-act stability is the fraction of permuted runs whose
      {sorted-categories|exogenous} fingerprint matches the original.
      Compares F-cluster (rule-priority gaps that motivated v0.6.0/v0.6.1)
