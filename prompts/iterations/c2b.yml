          count: 1
          category: "F"
          acts: [30]
          root_cause: >
            R&R's methodological rule: tax increase that partially
            undoes a prior exogenous tax cut should retain the same
            motivation. Codebook treats acts independently. LOW
            PRIORITY — structural limitation.
        pattern_7_document_gaps:
          count: 3
          category: "C"
          acts: [25, 32, 38]
          root_cause: >
            Pipeline/corpus gap: act 25 has 0 evidence items; act 32
            missing freight excise repeal provision for railroads (the
            key R&R classification basis); act 38 lacks documentary
            support for R&R's spending-driven classification. Too few
            congressional documents in corpus to surface critical
            evidence for these acts.
    interpretation: >
      Mixed progress on Sonnet v0.4.0. Raw accuracy improved marginally
      (65.8% vs 61.5% on Haiku v0.3.0). E errors eliminated (3 → 0),
      demonstrating v0.4.0's strengthening of decision rule 4 resolved
      the spending-offset reasoning pattern for acts 7 and 9. B errors
      remain at zero — R&R's ground truth is defensible in every case
      reviewed. But F errors are unchanged (10 in both iterations), with
      4 NEW regressions (acts 2, 4, 11, 24) appearing alongside 6 fixed
      prior errors. The regression pattern reveals the core v0.4.0 issue:
      individual rules were strengthened, but rule hierarchy was left
      ambiguous. When decision rule 1 (provision structure) conflicts
      with decision rule 4 (spending causal link) or boundary case rules
      1/4, the model picks whichever rule's wording is more absolute —
      which varies by act. This is not a model failure; it's a codebook
      specification failure. The 4 regressions are all cases where
      v0.4.0 introduced a strong rule without specifying when it yields.
      Separately, two structural codebook gaps persist: (1) multi-
      motivation single-label convention missing (acts 4, 35), and (2)
      tight/loose spending coupling test missing (acts 2, 11). The
      evidence inspection for acts 18, 32, 35 confirmed that for act 18
      and 35 evidence was abundantly sufficient — codebook is the
      bottleneck — but for act 32 the congressional documents missing
      from the corpus make R&R's classification unreachable regardless
      of codebook quality. C errors count increased by 1 (act 32
      upgraded from F to C after evidence inspection).
    decision: >
      Priority codebook fixes, bundled to address the rule-hierarchy
      problem holistically rather than piecemeal: (1) Specify rule
      hierarchy when decision rule 1 (provision structure) and
      decision rule 4 (spending causal link) both apply — which wins?;
      (2) Extend boundary case rule 4 (inflation-fighting → COUNTER)
      to cover inflation-vs-spending cases, not just inflation-vs-
      deficit; (3) Add tight/loose coupling test to decision rule 4
      (distinguish "tax enacted BECAUSE of spending program" from
      "tax with structural purpose whose revenues are earmarked");
      (4) Add multi-motivation single-label convention: when multiple
      motivations detected, default to endogenous category for
      single-label output. Lower priority: return-to-normal still too
      literal (acts 21, 23), push-above-normal gap (act 34),
      cross-act consistency (act 30 — structural, don't redesign).
      C-category acts (25, 32, 38) are corpus/pipeline issues — not
      addressable via codebook. Consider augmenting corpus with
      congressional committee reports for acts 20, 25, 32, 38.
      Before rerunning S2/S3 after codebook fixes, verify regressions
      (acts 2, 4, 11, 24) flip back to A without breaking the 6
      improvements (acts 7, 9, 13, 17, 19, 22).

