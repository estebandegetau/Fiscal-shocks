      Haiku to Sonnet (iteration 21) was partially based on this invalid signal.
      Ablation results ARE valid: Sonnet shows meaningful codebook utilization
      (all_removed drops wF1 by 8.0pp and accuracy by 10.5pp), much better than
      Haiku v0.4.0 (0.8pp wF1 drop). Label definitions contribute 7.9pp accuracy,
      confirming Sonnet uses them. Clarifications paradoxically hurt wF1 (-0.8pp)
      while helping accuracy (+5.3pp). Overall accuracy improved to 65.8% (from
      63.2% on Haiku v0.4.0) with wF1=0.658 (from 0.631), but exo precision
      regressed to 0.750 (from 0.824 on Haiku). Sonnet resolved Haiku's
      COUNTERCYCLICAL magnet problem (6 preds vs 15 on Haiku) but introduced
      more SPENDING_DRIVEN false positives.
    decision: >
      Proceed to manual error analysis (S3 manual) on Sonnet's 13 misclassified
      acts using H&K 6-category framework before making codebook or model
      decisions. The Test VII bug must be fixed before Test VII results can
      inform any decision — the test needs conceptual redesign: either swap
      label-name references in the instructions block alongside the class
      definitions, or remove label-name directives from the instructions section
      entirely (making instructions label-name-agnostic). Reassess Haiku's
      viability once valid Test VII data is available — the prior conclusion
      that "Haiku can't follow definitions" was based on invalid test results.

