          severity: "low"
          affected_acts: 1
          description: >
            RR sometimes classifies acts based on relationship to prior
            exogenous acts (offsetting principle). Codebook treats each act
            independently. Low priority edge case.
        - gap: "congressional_corpus"
          severity: "medium"
          affected_acts: 3
          description: >
            Executive-branch documents dominate the corpus. For acts where
            congressional motivation differs from executive (veto overrides,
            industry-specific provisions), the model lacks evidence. Adding
            congressional committee reports would address acts 20, 33, and
            partially 22.
    interpretation: >
      Performance was strong for the first round of C2b development. 24/39
      acts correct (61.5% raw accuracy), with zero B errors (RR's ground
      truth is defensible in every case) and zero D errors (full output
      compliance). The error distribution is highly encouraging: F errors
      dominate (10/15 = 66.7% of errors), meaning the codebook — not the
      model — is the primary bottleneck. Only 3 errors are genuine model
      reasoning failures (category E), all from one pattern (spending-offset
      recognition). The 7 LONG_RUN→COUNTERCYCLICAL errors share a single
      root cause: the return-to-normal test is too literal and the frequency
      rule disadvantages LONG_RUN. Addressing the identified codebook gaps
      (especially return-to-normal disambiguation and provision-level
      analysis) combined with a possible model upgrade could realistically
      yield ~95% accuracy. The remaining ~5% (2 C errors) would require
      additional congressional data in the corpus. Bias-corrected accuracy
      excluding document errors is 64.9% (24/37), with E errors at 8.1%
      and F errors at 27.0%.
    decision: >
      Proceed to edit codebook with observations from manual analysis. Priority
      codebook changes: (1) Sharpen return-to-normal test to distinguish
      "closing output gap via structural reform" from "demand management" —
      add guidance on reading through rhetorical framing to provision-level
      intent; (2) Modify frequency-based decision rule to weigh provision
      structure alongside stated framing; (3) Add guidance on "push growth
      above normal" as LONG_RUN even when language sounds countercyclical;
      (4) Clarify that inflation-fighting fiscal restraint is COUNTERCYCLICAL,
      not DEFICIT_DRIVEN. Lower priority: cross-act consistency, veto-override
      guidance, status-quo-preservation distinction. After codebook edits,
      rerun S1 to confirm behavioral tests still pass, then S2+S3 for
      updated metrics. Consider Sonnet evaluation if Haiku plateaus after
      codebook improvements.

