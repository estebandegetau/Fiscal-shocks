        n_acts_excluded: 22
        n_multiple_dominant: 2
        n_exo_inconsistent: 0
      confusion_matrix:
        note: >
          Dominant confusion: LONG_RUN misclassified as COUNTERCYCLICAL (2 acts)
          and SPENDING_DRIVEN (1 act). SPENDING_DRIVEN misclassified as LONG_RUN
          (2 acts). LONG_RUN worst-performing class (F1=0.40, recall=0.33).
      na_diagnostics:
        note: >
          22 NA acts all have zero C2a failures. C2b fails on high-evidence
          acts: median 88.5 evidence items (range 47-233) vs valid acts median
          58 (range 1-109). Root cause: max_tokens_c2b=1024 insufficient for
          Haiku to produce valid JSON with reasoning when processing 50+
          evidence items. All c2b_raw_response values are NA (call failure,
          not parse failure).
      comparison_vs_flash_sensitivity:
        note: >
          Flash sensitivity (iteration 7): 32/39 valid, weighted_f1=0.656,
          exo_precision=0.727. Haiku sensitivity: 17/39 valid, weighted_f1=0.564,
          exo_precision=0.667. Haiku's thorough C2a extraction paradoxically
          produces worse results because evidence volume overwhelms C2b.
    interpretation: >
      C2b's classification quality is reasonable on the 17 acts where it
      produces valid output (DEFICIT_DRIVEN F1=0.75, COUNTERCYCLICAL F1=0.67),
      but 56% NA rate makes all metrics unreliable. The NAs are not a codebook
      issue — they are a pipeline parameter issue (max_tokens_c2b=1024 too
      small for Haiku's thorough extraction output). LONG_RUN remains the
      weakest class (F1=0.40), continuing the pattern from Flash iterations
      where structural reform language gets confused with countercyclical or
      spending-driven motivations. However, codebook iteration is premature
      until the NA rate is resolved — we cannot diagnose classification errors
      on a 44% subsample biased toward simpler acts.
    decision: >
      Increase max_tokens_c2b from 1024 to 4096 before re-running. Refactor
      pipeline to share C2a extraction results between baseline and sensitivity
      conditions (currently calling C2a twice on overlapping chunks). Defer
      codebook changes until clean Haiku metrics are available on all 39 acts.
