      true_sign from sign(magnitude_billions) in aligned_data.
      run_c2b_classification parses the new schema (drops the entire
      motivations[] collapse block, multiple_dominant/no_dominant flags
      removed). evaluate_c2_classification rewritten: drops 4-class
      block, adds compute_sign_metrics_on_true_exo helper, two co-equal
      headline metrics (exogenous_precision and
      sign_accuracy_on_true_exo) with bootstrap CIs, plus diagnostic
      signed_exo_precision = P(pred_exo == TRUE AND correct sign | true
      exogenous). compute_multiclass_metrics preserved as dead helper.

