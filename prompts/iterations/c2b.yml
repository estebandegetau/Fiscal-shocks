          Codebook lacks explicit priority rules for cases where
          multiple decision rules or boundary case rules apply
          simultaneously. Specific gaps observed: (a) DR1 (provision
          structure → LONG_RUN) vs DR4 (spending causal link →
          SPENDING_DRIVEN) — acts 7, 19; (b) DR1 vs BCR4 (inflation-
          fighting → COUNTERCYCLICAL) — act 2; (c) DR3 lacks
          tiebreaker for multi-dominant fiscal-impact ties — act 23;
          (d) BCR3 scoped to block COUNTER only, not LONG_RUN —
          act 19; (e) SPENDING_DRIVEN clarifications skew toward
          "financing increases" rather than "offsetting decreases"
          — act 19; (f) general "return-to-normal" misapplication
          on classic Kennedy-era LONG_RUN cases — acts 22, 24, 35.
        proposed_fix_strategy: >
          A multi-component overhaul of decision rules + boundary
          case rules with explicit priority guidance, rather than
          single-clarification edits. Per iter 29's ablation finding
          (individual components have Δ wF1 < 0.02, all components
          removed gives Δ wF1 = 0.057), single-clarification tweaks
          are unlikely to break the wF1 ceiling. The F-cluster
          (9 acts, 23.7%) is the lever — addressing rule-priority
          gaps systematically could close several errors at once.
