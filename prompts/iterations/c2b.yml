          F-category codebook gaps driven by v0.4.0's strengthening
          of decision rule 1 (provision structure) and decision rule
          4 (spending causal link precedence) without specifying rule
          hierarchy. Net: fewer reasoning errors, more codebook-gap
          errors. The underlying issue is a rule-priority problem
          introduced by v0.4.0 edits: strong rules in isolation,
