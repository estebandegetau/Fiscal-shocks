      structural reform / inherited deficit / treaty/rule compliance);
      definition of endogenous (response to current macro conditions or
      contemporaneous spending); the Das et al. critical clarifier
      verbatim ("Acknowledging current conditions does not by itself
      imply endogeneity if the stated motive is explicitly
      non-cyclical"); conservative aggregation rule for mixed-component
      acts (return exogenous: UNCLEAR rather than ranking shares); sign
      convention (change in fiscal liabilities); enacted-status
      determination rule. Four short illustrative examples covering the
      four corners of the {exogenous, sign} schema (no US-specific
      worked examples). Parsed prompt is 119 lines (vs v0.6.1's
      multi-hundred-line generated prompt).


