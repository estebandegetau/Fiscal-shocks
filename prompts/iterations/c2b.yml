      overfit signature: F-A gap -0.333, exactly the same as iter 36.
      The codebook is faithful to R&R's original language (per the
      v0.9.0 brief), so if there is overfit it is structural to the
      embedded-guardrail design, not vocabulary. However, the asymmetry
      of the failure cuts against a pure overfit reading. A-cluster
      stability is now near-perfect (mean 0.972, kappa 0.964 almost-
      perfect), with only one act unstable (SS 1983), and that
      instability is a SPENDING<->DEFICIT label flip with the exogenous
      regime preserved. This is the stability profile of a non-overfit
      prompt on its in-distribution cases. If the codebook were broadly
      order-fragile, A-cluster stability would also degrade (as in
      v0.6.1, where A mean was 0.861). Instead, the entire instability
      is concentrated in the 9 F-cluster acts, which by construction
      are the cases v0.6.1 misclassified — i.e., the borderline /
      tough-call acts in the corpus. The pattern (high A stability,
      moderate F stability) is consistent with a well-calibrated
      prompt that genuinely struggles on the boundary cases (LR<->CC
      on Revenue Acts 1964/1978, CC<->SPENDING on Tax Adjustment 1966
      and Crude Oil 1980), rather than a prompt that has memorized
      surface features for the in-distribution training acts. The
      diagnostic alone cannot distinguish "borderline cases" from
      "overfit anchor cases" without additional evidence, which is
      what S3 manual analysis is designed to provide.
    decision: >
      Proceed to S3 manual analysis on v0.9.1 despite the diagnostic
      verdict, on the basis of the asymmetric stability pattern
      (A-cluster almost-perfect, F-cluster moderate). The hard
      F-A-gap > -0.10 gate is being deferred pending S3 manual review,
      not waived; the manual analysis is the disambiguation step. S3
      should specifically tag (a) whether the unstable F-cluster acts
      are R&R-judgment-call boundary cases (codebook-scope ambiguity,
      analogous to C1's residual F errors), or (b) genuine overfit
      anchors where the codebook fires on surface features that
      reorder under permutation. If S3 finds (a) dominates, treat the
      F-A gap as an artifact of the F-cluster's borderline construction
      and proceed to deployment with documented caveats. If S3 finds
      (b) dominates, return to codebook revision targeting the
      LR<->CC and CC<->SPENDING boundaries. No codebook YAML edits at
      this point.

