    interpretation: >
      Pipeline validation run — pipeline ran successfully end-to-end. Gemini 2.5
      Flash failed to comply with output schema: 35.8% C2a failure rate (182/509
      chunks), 12 of 39 acts excluded due to C2b parse failures. Metrics are
      unreliable for codebook evaluation given the high exclusion rate (31% of
      acts dropped). On the 27 valid acts, dominant confusion pattern is
      SPENDING_DRIVEN ↔ LONG_RUN (5 acts misclassified), but this signal is
      noisy given the small valid sample. This was a model compliance issue
      (H&K category C), not a codebook issue.
    decision: >
      Move on with S3 pipeline implementation and S2 real Haiku tests. Flash
      compliance issues confirm that model choice matters for output schema
      adherence — Haiku S2 run will provide clean metrics for actual codebook
      evaluation.

