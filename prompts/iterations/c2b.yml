      Decisive overfit signal at the project's pre-registered -0.10
      threshold (gap = -0.333). Of the 9 F-cluster acts that motivated
      v0.6.0/v0.6.1's rule additions, only ~1 of 9 is fully order-stable
      on a non-trivial evidence array (Tax Reduction & Simplification
      1977, n=4) — the other 8 are either order-fragile (4 acts at
      stability 0.333-0.667) or have no evidence to shuffle. F-cluster
      Fleiss kappa (0.530) confirms moderate-only agreement across the
      4 runs per act. However, the A-cluster is also non-uniformly
      stable (kappa 0.794 substantial, but 6/24 acts below 0.80
      stability and one act at 0.0), suggesting C2b has a baseline
      ordering-fragility problem that v0.6.1's rule additions amplify
      on the F-cluster they were authored against. The diagnostic
      cannot, on its own, distinguish "v0.6.1 introduced the overfit"
      from "C2b is structurally fragile and v0.6.1 made the F-cluster
      worse." A v0.5.0 baseline shuffle is the cheapest way to
      attribute. This finding is independent of, and complementary to,
      iter 35's structural-ceiling diagnosis: iter 35 says the wF1
      ceiling is taxonomy-or-model-level rather than codebook-level;
      iter 36 adds that the codebook itself is order-fragile on
      precisely the acts where its rules are supposed to fire.
