      hit 32K context limit on high-evidence acts. Pipeline infrastructure added:
      run_c2_zero_shot(), assemble_c2_s2_test_set(), evaluate_c2_classification().
    results:
      overall_pass: false
      n_total: 39
      n_valid: 27
      c2a_failure_rate: 0.3576
