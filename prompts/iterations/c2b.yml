            coupling test. R&R distinguish (a) tax enacted BECAUSE of
            a spending program (tight — SPENDING_DRIVEN) from (b) tax
            with structural/regulatory purpose whose revenues happen
            to be earmarked (loose — LONG_RUN/DEFICIT). v0.4.0 edits
            strengthened DR4 without adding this distinction. Priority
            fix.
        pattern_4_return_to_normal_persistent:
          count: 2
          category: "F"
          acts: [21, 23]
          root_cause: >
            Return-to-normal test still too literal despite v0.4.0
            edits. Kennedy tax cut (1964) and Revenue Act 1978 both
            read as cyclical response when R&R read as structural
