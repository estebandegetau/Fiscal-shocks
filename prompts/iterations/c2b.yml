      new schema (drops motivations[] validation, adds enum checks for
      exogenous and sign). test_c2b_legal_outputs diagnostic columns
      changed from pred_category/exogenous to pred_exogenous/pred_sign.
      test_c2b_definition_recovery replaced by test_c2b_schema_recovery
      (synthetic evidence sets keyed by expected (exogenous, sign);
      replaces 4-class definition recovery). test_c2b_order_invariance
      gains an early-return when codebook has no classes (degenerate).

