      v0.3.0 detection reframe massively improved recall (+52 pp combined,
      +40 pp Tier 1) vs v0.2.0 (iteration 9) while keeping precision high
      (95.1%). The dominant-topic heuristic that caused catastrophic recall
      in v0.2.0 is largely resolved. Remaining 144 FN are dominated by
      "not enacted/proposed" reasoning (87% of FN cite this) — the model
      over-applies the negative clarification about unenacted proposals to
      chunks where enacted acts are discussed in forward-looking or
      conditional tense. 32 FP are largely H&K Error Category F (ambiguous
      ground truth): genuine fiscal measures not in the 44-act label set,
      meaning reported precision is a conservative lower bound. 19
      zero-recall act-year rows are all Tier 2-only single-chunk distant
      references. Tier 1 and Tier 2 miss rates are similar (~17-19%),
      suggesting the problem is the model's enacted-status threshold, not
      reference vagueness. 0 parse failures (100% valid JSON from Haiku).
    decision: >
      Revise codebook to v0.4.0 with a strategic reframe based on
      discussion of results. Three changes: (1) Remove the enacted/proposed
      filter from C1 entirely — C1 becomes a recall-optimized relevance
      filter for fiscal policy discussion; enacted status determination
      moves downstream to a future filter or C2. If we ex post find more
      acts than R&R, we add an enacted filter downstream. (2) Further
      soften the substantive detail bar to push Tier 1 recall toward 95%+;
      Tier 1 recall is the top priority because these chunks carry the
      richest information for C2-C4 classification. (3) Accept that
      reported precision is conservative due to Category F FPs in the
      negative test set. Precision cost is bearable because downstream
      codebooks (C2-C4) will filter irrelevant chunks. Additionally,
      improve the act identification pipeline to search for acronym
      mentions of known acts (e.g., ERTA, OBRA, TRA), improving label
      coverage for evaluation.

