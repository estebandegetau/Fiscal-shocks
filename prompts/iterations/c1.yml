      failure. Fixed in commit f869bcb by preserving raw_response through all
      classification paths (single-call, self-consistency, S1, S2).
    decision: >
      Re-run S1 on Qwen with raw_response capture to diagnose the 2 JSON
      failures before proceeding.

  - iteration: 5
    codebook_version: "0.2.0"
    date: "2026-03-02"
    git_commit: "fa7082d"
    model: "qwen/qwen-2.5-72b-instruct"
    provider: "openrouter"
    stage: "s1"
    changes: >
      No codebook changes. Re-ran S1 with stop_reason field propagated
      through classify_with_codebook() to behavioral test results. Added
      stop_reason to return values in codebook_stage_0.R (single-call and
      self-consistency paths), functions_self_consistency.R, behavioral_tests.R
      (Test I details tibble), and codebook_stage_2.R (S2 fold tibble).
    results:
      overall_pass: false
      metrics:
        - test: "I_legal_outputs"
          value: 0.9000
          threshold: 1.0000
          pass: false
        - test: "II_definition_recovery"
          value: 1.0000
          threshold: 1.0000
          pass: true
        - test: "III_example_recovery"
          value: 1.0000
          threshold: 1.0000
          pass: true
          skipped: true
        - test: "IV_order_invariance"
          value: 0.0000
          threshold: 0.0500
          pass: true
          change_rate_reversed: 0.0000
          change_rate_shuffled: 0.0000
          fleiss_kappa: 1.0000
          kappa_interpretation: "Near-perfect agreement"
      failure_details:
        - text_id: 13
          doc_id: "BUDGET-1950"
          chunk_id: 149
          approx_tokens: 24663
          numeric_density: 0.63
          raw_response: ""
          stop_reason: "end_turn"
        - text_id: 17
          doc_id: "BUDGET-1949"
          chunk_id: 152
          approx_tokens: 18569
          numeric_density: 0.58
          raw_response: ""
          stop_reason: "end_turn"
    interpretation: >
      Diagnostic re-run confirms iteration 4 failures are a Qwen model
      limitation, not a codebook or API issue. Both failed chunks are massive
      OCR'd budget appropriation tables (58-63% numeric lines, 19K-25K tokens)
      from late-1940s Budget documents. stop_reason = "end_turn" for both,
      ruling out content filtering and token truncation. The model deliberately
      produced empty completions on degenerate table-heavy inputs. The two
      failed chunks are the largest in the 20-text sample by a wide margin;
      the next largest passing chunk is 12K tokens of narrative prose. Corpus
      analysis shows 55% of negative chunks and 25% of positive chunks have
      >40% numeric density, so filtering tables would discard too much data,
      especially for C4 magnitude extraction.
    decision: >
      Declare Qwen 2.5 72B unable to handle degenerate table-heavy inputs.
      Return to Claude Haiku for formal S1 validation on codebook v0.2.0.
      OpenRouter/Qwen infrastructure is validated and available for future
      cost-effective exploration. Table-heavy chunk quality is a known upstream
      issue to revisit during Phase 1 text extraction improvements.

  - iteration: 6
    codebook_version: "0.2.0"
    date: "2026-03-03"
    git_commit: "dc31b4e"
    model: "qwen/qwen-2.5-72b-instruct"
    provider: "openrouter"
    stage: "s2"
    changes: >
      No codebook changes. First attempted S2 LOOCV run. Added error body
      extraction to call_openai_api() (req_error with tryCatch fallback)
      to surface OpenRouter error details instead of generic "HTTP 400".
    results:
      overall_pass: false
      pipeline_error: true
      error_message: >
        HTTP 400 Bad Request — This endpoint's maximum context length is
        32768 tokens. However, you requested about 32882 tokens (32382 of
        text input, 500 in the output). Please reduce the length of either
        one, or use the "middle-out" transform to compress your prompt
        automatically.
      metrics: []
    interpretation: >
      Pipeline failed before producing any S2 results. The OpenRouter
      Qwen 2.5 72B endpoint enforces a 32K token context limit, well
      below the ~50K worst-case token budget (chunk + codebook prompt +
      few-shot examples + overhead) validated in verify_api_inputs.qmd
      for Haiku's 200K window. The error was initially opaque ("HTTP 400
      Bad Request") until we added req_error body extraction to
      call_openai_api(), mirroring the pattern already in
      call_claude_api(). The surfaced detail confirmed a context window
      mismatch, not a codebook or data issue. Restructuring chunks to
      fit 32K would compromise evaluation quality and invalidate all
      downstream targets.
    decision: >
      Switch to meta-llama/llama-3.3-70b-instruct on OpenRouter (128K
      context) for a pipeline smoke test to validate S2 mechanics
      (fold logic, JSON parsing, result aggregation, evaluation metrics)
      before committing to Claude Haiku at production rates. Model ID
      already updated in _targets.R. After successful Llama run, switch
      to claude-haiku-4-5-20251001 for the real S2 evaluation.
