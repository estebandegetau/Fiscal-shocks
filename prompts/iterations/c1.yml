    interpretation: >
      There may be room for codebook improvement. The 3 Category E errors
      share a common pattern: the model conflates government financial
      actions (intergovernmental transfers, education appropriations, debt
      management) with taxpayer-liability-changing fiscal measures. The
      Category F case (EIA) reveals R&R boundary ambiguity on organizational
      acts with fiscal implications. The 5 Category B errors confirm that
      all false negatives are gold-standard noise from IKA Tier 2 matching,
      not codebook or model failures. Bias-corrected recall is 100%.
    decision: >
      Consider improving the codebook with a clarification distinguishing
      changes to taxpayers' liabilities from other government financial
      actions (intergovernmental transfers, debt management, organizational
