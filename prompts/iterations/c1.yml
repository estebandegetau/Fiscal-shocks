      metrics: []
    interpretation: >
      Pipeline failed before producing any S2 results. The OpenRouter
      Qwen 2.5 72B endpoint enforces a 32K token context limit, well
      below the ~50K worst-case token budget (chunk + codebook prompt +
      few-shot examples + overhead) validated in verify_api_inputs.qmd
      for Haiku's 200K window. The error was initially opaque ("HTTP 400
      Bad Request") until we added req_error body extraction to
      call_openai_api(), mirroring the pattern already in
      call_claude_api(). The surfaced detail confirmed a context window
      mismatch, not a codebook or data issue. Restructuring chunks to
      fit 32K would compromise evaluation quality and invalidate all
      downstream targets.
    decision: >
      Switch to meta-llama/llama-3.3-70b-instruct on OpenRouter (128K
