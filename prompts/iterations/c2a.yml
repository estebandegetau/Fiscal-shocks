        - test: "IV_order_invariance"
          value: ~
          threshold: 0.0500
          pass: true
          note: "skipped — classless codebook, no categorical output to compare"
    interpretation: >
      All non-skipped tests pass on Haiku. Test I regression from iteration 6
      (80%→100%) resolved by increasing max_tokens from 1024 to 4096, eliminating
      truncation on high-evidence chunks. Test IV is now structurally inapplicable:
      v0.4.0 removed suggested_category, so C2a produces no categorical output for
      order invariance comparison. The skip is methodologically sound for a classless
      extraction codebook. Extraction output variability (evidence count/content
      across orderings) will be evaluated indirectly at S2 through C2a→C2b pipeline
      accuracy. Test II confirms Haiku faithfully follows extraction instructions
      (4/4 synthetic evidence sets correctly extracted).
    decision: >
      C2a S1 gate passed. Proceed to S2 on Haiku. Run both baseline (with
      discusses_motivation filter) and sensitivity (without filter) conditions
      to confirm iteration 7's finding that the filter hurts C2 performance.

  - iteration: 8
    codebook_version: "0.4.0"
