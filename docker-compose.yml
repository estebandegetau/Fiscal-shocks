services:
  fiscal-shocks:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiscal-shocks
    volumes:
      # Mount data directories for persistence
      - ./data:/app/data
      # Mount targets cache to persist pipeline state
      - ./_targets:/app/_targets
      # Mount notebooks for development
      - ./notebooks:/app/notebooks
      # Mount R source for development
      - ./R:/app/R
      # Mount Python scripts for development
      - ./python:/app/python
      # Persist renv package cache across image rebuilds
      - renv-cache:/renv/cache
    environment:
      - TZ=UTC
      - RENV_PATHS_CACHE=/renv/cache
    # Keep container running for interactive use
    stdin_open: true
    tty: true
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # Interactive R session
  rstudio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiscal-shocks-interactive
    volumes:
      - ./data:/app/data
      - ./_targets:/app/_targets
      - ./notebooks:/app/notebooks
      - ./R:/app/R
      - ./python:/app/python
      - renv-cache:/renv/cache
    environment:
      - TZ=UTC
      - RENV_PATHS_CACHE=/renv/cache
    stdin_open: true
    tty: true
    command: R
    profiles:
      - interactive

volumes:
  renv-cache:
