project:
  type: website
  output-dir: _manuscript
  render:
    - docs/*.qmd
    - notebooks/*.qmd
    # - reports/*.qmd
    - index.qmd
    - "!*unused/"
    - "!notebooks/c1*.qmd"

website: 
  sidebar: 
    style: "floating"
    search: true
    title: "Scaling Fiscal Shocks"
    contents:
      - index.qmd
      - section: "Data Foundation"
        contents:
          - notebooks/review_data.qmd
          - notebooks/verify_body.qmd
          - notebooks/data_overview.qmd
      - section: "Data Quality"
        contents:
          - notebooks/test_text_extraction.qmd
      - section: "Pipeline Design"
        contents:
          - notebooks/identifying_known_acts.qmd
          - notebooks/verify_chunk_tiers.qmd
          - notebooks/verify_api_inputs.qmd
      - section: "Codebook Evaluation"
        contents:
          - notebooks/c1_measure_id.qmd


title-block-banner: true
lightbox: true
reference-location: margin

code-links: repo

execute:
  freeze: auto  # re-render only when source changes


citeproc: true
csl: https://www.zotero.org/styles/chicago-author-date-classic-no-url

bibliography: references.bib
