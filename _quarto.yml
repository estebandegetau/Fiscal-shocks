project:
  type: website
  output-dir: _manuscript
  render:
    - docs/*.qmd
    - notebooks/*.qmd
    - reports/*.qmd
    - "!reports/20260121-model-a.qmd"
    - "!reports/20260117.qmd"
    - index.qmd
    - "!*unused/"
    # - "!notebooks/c1*.qmd"
    # - "!notebooks/identifying_known_acts.qmd"

author: 
  - name: "Esteban Degetau"
    email: "estebandegetau@gmail.com"
    affiliation: "World Bank"
  - name: "Agustín Samano"
    email: "asamanopenaloza@worldbank.org"
    affiliation: "World Bank"
  
keywords:
  - Fiscal policy
  - AI for social science

website: 
  sidebar: 
    style: "floating"
    search: true
    title: "Scaling Fiscal Shocks"
    contents:
      - index.qmd
      - section: "Data Foundation"
        contents:
          - notebooks/review_data.qmd
          - notebooks/verify_body.qmd
          - notebooks/data_overview.qmd
          - notebooks/verify_c2_inputs.qmd
      - section: "Data Quality"
        contents:
          - notebooks/test_text_extraction.qmd
      - section: "Pipeline Design"
        contents:
          - notebooks/identifying_known_acts.qmd
          - notebooks/verify_chunk_tiers.qmd
          - notebooks/verify_api_inputs.qmd
      - section: "Codebook Evaluation"
        contents:
          - notebooks/c1_measure_id.qmd
      - section: "Progress Reports"
        contents: reports/


title-block-banner: true
lightbox: true
reference-location: margin

code-links: repo

execute:
  freeze: auto  # re-render only when source changes


citeproc: true
csl: https://www.zotero.org/styles/chicago-author-date-classic-no-url

bibliography: references.bib
